west-commands:
  - file: scripts/zmk_test.py
    commands:
      - name: zmk-test
        class: ZMKTest
        help: Run ZMK unit tests
  - file: scripts/zmk_build.py
    commands:
      - name: zmk-build
        class: ZMKBuild
        help: Build ZMK firmware for given zmk-config
  - file: scripts/zmk_renode_test.py
    commands:
      - name: zmk-renode-test
        class: ZMKRenodeTest
        help: Run ZMK Renode emulator tests against a pre-built ELF
