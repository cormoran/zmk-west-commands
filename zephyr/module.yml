# Root Zephyr module manifest for zmk-west-commands.
#
# zmk-west-commands is tooling (west commands + the Renode/bsim test harness),
# not a runtime ZMK module: it ships no build-time CMake/Kconfig of its own. This
# manifest exists only so the repo is a valid, inert Zephyr module -- e.g. the
# BLE bsim job adds it via ZMK_EXTRA_MODULES (`zmk-ble-test --module .`) and a
# build must be able to resolve it without pulling in any code.
name: zmk-west-commands
