name: "ZMK Renode Test"
description: >-
  Boot an already-built ZMK firmware ELF in the Renode emulator, run a
  generic boot + core Studio RPC smoke test, and (optionally) the module's
  own Renode test suite -- all via `west zmk-renode-test`. This action only
  wraps environment setup (Renode cache + install of the python protobuf /
  protoc deps); it does NOT build firmware and does NOT ship the test logic
  (that comes from the `zmk-west-commands` west command, which the caller
  must already have in its manifest and `west update`d). See README.md in
  this directory for the full contract.

# Path inputs (`elf-path`, `tests`) may be relative; relative paths are
# resolved against $GITHUB_WORKSPACE *inside the step* (NOT via the
# ${{ github.workspace }} expression). This matters for container jobs: the
# expression evaluates to the runner-host path (/home/runner/work/...) while
# the checkout is mounted at /__w/... inside the container -- the env var is
# path-translated by the runner, expressions are not (actions/runner#716).
inputs:
  elf-path:
    description: >-
      Path to the already-built DUT firmware ELF to test (relative paths are
      resolved against $GITHUB_WORKSPACE). The caller builds this -- for the
      default ble mode the exact `studio-rpc-usb-uart` hardware image (no extra
      config -- the same image you flash); for uart mode a `build.yaml` artifact
      built with this repo's `renode-studio-uart` snippet.
    required: true
  mode:
    description: >-
      Test mode: `ble` (default -- boots the exact `studio-rpc-usb-uart`
      hardware image, no extra module config; Studio over emulated BLE, with
      `host-elf` a full S4/S5 pairing + encrypted read, else a boot-liveness
      check), `uart` (snippet-built DUT, Studio over emulated UARTs, which
      requires a `renode-studio-uart` build.yaml artifact), or `split` (wired
      split -- `elf-path` is the central half, `peripheral-elf` the peripheral;
      smoke = both boot banners + a peripheral keypress relayed to the central).
      See README.md.
    required: false
    default: "ble"
  peripheral-elf:
    description: >-
      split mode only: path to the built PERIPHERAL half's firmware ELF
      (relative paths resolve against $GITHUB_WORKSPACE; `elf-path` is the
      central half). Required when mode is `split`.
    required: false
    default: ""
  host-elf:
    description: >-
      ble mode only: path to the built renode-ble-host app ELF (relative paths
      resolve against $GITHUB_WORKSPACE). Given -> full S4/S5 Studio-over-BLE
      smoke; omitted -> boot-liveness only. Build it with
      `west build -b nrf52840dk/nrf52840 -s <this repo>/renode-ble-host`,
      passing `-DCONFIG_RENODE_BLE_HOST_TARGET_NAME='"<your DUT name>"'` when the
      DUT's advertised name does not start with the default "Module".
    required: false
    default: ""
  tests:
    description: >-
      Path (relative to $GITHUB_WORKSPACE) to a directory of the module's own
      Renode test files, e.g. `tests/renode`. Every `*_test.py` directly under
      it is run (non-recursively). Leave empty to run only the smoke test.
    required: false
    default: ""
  renode-version:
    description: "Renode portable release version to install."
    required: false
    default: "1.16.1"
  boot-timeout-seconds:
    description: "Smoke test: seconds to wait for the ZMK boot banner."
    required: false
    default: "20"

runs:
  using: "composite"
  steps:
    - name: Cache Renode install
      uses: actions/cache@v4
      with:
        path: ~/.renode
        key: renode-${{ inputs.renode-version }}-${{ runner.os }}

    - name: Install Python + protoc dependencies
      shell: bash
      # The zmkfirmware/zmk-build-arm container has python3 but no
      # `python3 -m pip` (west is preinstalled another way), and no sudo
      # (steps already run as root), and no curl/wget -- try the least
      # invasive route first and fall back progressively.
      run: |
        apt_get() {
          if command -v sudo >/dev/null 2>&1; then sudo apt-get "$@"; else apt-get "$@"; fi
        }
        apt_updated=""
        apt_install() {
          if [ -z "$apt_updated" ]; then apt_get update -y; apt_updated=1; fi
          apt_get install -y --no-install-recommends "$@"
        }

        if ! python3 -c "import google.protobuf" >/dev/null 2>&1; then
          python3 -m pip install --quiet protobuf 2>/dev/null \
            || pip3 install --quiet protobuf 2>/dev/null \
            || apt_install python3-protobuf
          python3 -c "import google.protobuf; print('python protobuf', google.protobuf.__version__)"
        fi

        if ! command -v protoc >/dev/null 2>&1; then
          apt_install protobuf-compiler
        fi
        protoc --version

    - name: Run Renode tests
      shell: bash
      # Runs from the default working directory ($GITHUB_WORKSPACE, the west
      # topdir the caller already init/update'd). Resolve every (possibly
      # relative) path input against $GITHUB_WORKSPACE -- the env var, which
      # is container-path-translated, unlike the ${{ github.workspace }}
      # expression (see the header note).
      env:
        IN_ELF_PATH: ${{ inputs.elf-path }}
        IN_MODE: ${{ inputs.mode }}
        IN_HOST_ELF: ${{ inputs.host-elf }}
        IN_PERIPHERAL_ELF: ${{ inputs.peripheral-elf }}
        IN_TESTS: ${{ inputs.tests }}
        IN_RENODE_VERSION: ${{ inputs.renode-version }}
        IN_BOOT_TIMEOUT: ${{ inputs.boot-timeout-seconds }}
      run: |
        abspath() {
          case "$1" in
            /*) echo "$1" ;;
            *)  echo "$GITHUB_WORKSPACE/$1" ;;
          esac
        }
        elf_path="$(abspath "$IN_ELF_PATH")"
        if [ ! -f "$elf_path" ]; then
          echo "::error::elf-path does not exist: $elf_path (this action does not build firmware -- build it in an earlier step; see README.md)"
          exit 1
        fi

        args=(--elf "$elf_path" --mode "$IN_MODE" --renode-version "$IN_RENODE_VERSION" --boot-timeout "$IN_BOOT_TIMEOUT")
        if [ -n "$IN_HOST_ELF" ]; then
          args+=(--host-elf "$(abspath "$IN_HOST_ELF")")
        fi
        if [ -n "$IN_PERIPHERAL_ELF" ]; then
          peripheral_elf="$(abspath "$IN_PERIPHERAL_ELF")"
          if [ ! -f "$peripheral_elf" ]; then
            echo "::error::peripheral-elf does not exist: $peripheral_elf (this action does not build firmware -- build it in an earlier step; see README.md)"
            exit 1
          fi
          args+=(--peripheral-elf "$peripheral_elf")
        fi
        if [ -n "$IN_TESTS" ]; then
          west zmk-renode-test "$(abspath "$IN_TESTS")" "${args[@]}"
        else
          west zmk-renode-test "${args[@]}"
        fi
