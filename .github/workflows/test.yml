name: Test West Commands

on:
  push:
    branches: ["**"]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install ruff with pipx
        run: |
          pipx install "ruff==0.15.11"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Lint with ruff
        run: ruff check .
      - name: Check formatting with ruff
        run: ruff format --check --diff .

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    container:
      image: zmkfirmware/zmk-build-arm:stable
    name: Build
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Cache west modules
        uses: actions/cache@v4
        continue-on-error: true
        env:
          cache_name: cache-west-modules
        with:
          path: dependencies/
          key: ${{ runner.os }}-build-${{ env.cache_name }}-${{ hashFiles('scripts/west-test.yml') }}
          restore-keys: |
            ${{ runner.os }}-build-${{ env.cache_name }}-
      - name: Init
        run: |
          git config --global --add safe.directory ${{ github.workspace }}
          west init -l . --mf scripts/west-test-standalone.yml
          west update --narrow
          west zephyr-export
      - name: Dry run command for quick check
        run: west zmk-build tests/build_yaml -n
      - name: Run test
        run: python3 -m unittest -v

  renode:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    container:
      image: zmkfirmware/zmk-build-arm:stable
    name: Renode
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Cache west modules
        uses: actions/cache@v4
        continue-on-error: true
        env:
          cache_name: cache-west-modules-renode
        with:
          path: dependencies/
          key: ${{ runner.os }}-build-${{ env.cache_name }}-${{ hashFiles('scripts/west-test-renode.yml') }}
          restore-keys: |
            ${{ runner.os }}-build-${{ env.cache_name }}-
      - name: Init
        # Renode targets ZMK's HWv2 xiao_ble//zmk board, which is only on newer
        # ZMK -- so this uses a `main`-pinned manifest, separate from the
        # v0.3-branch one the build/unittest job uses (see west-test-renode.yml).
        run: |
          git config --global --add safe.directory ${{ github.workspace }}
          west init -l . --mf scripts/west-test-renode-standalone.yml
          west update --narrow
          west zephyr-export
      - name: Build ble-mode DUT (real studio-rpc-usb-uart image)
        # The DUT for the DEFAULT ble mode: the exact hardware-flashable image,
        # with NO renode-studio-uart snippet (build-ble.yaml). -d keeps the ELF
        # under $GITHUB_WORKSPACE (the standalone manifest puts `west topdir` at
        # the checkout's parent, so the default build dir would land outside it).
        run: west zmk-build tests/zmk-config --build-yaml tests/zmk-config/build-ble.yaml -af ble -d build
      - name: Build uart-mode DUT (renode-studio-uart snippet image)
        # Kept so uart mode stays covered too. build-renode.yaml is a separate
        # file so the v0.3 unittests never try to build the HWv2 board.
        run: west zmk-build tests/zmk-config --build-yaml tests/zmk-config/build-renode.yaml -af renode -d build
      - name: Build renode-ble-host app
        # The Studio-over-BLE host (a stock nrf52840dk Zephyr app). Match its
        # target-name prefix to this repo's DUT, which the renode_tester shield
        # names "Renode" (tests/.../renode_tester/Kconfig.defconfig); the default
        # "Module" prefix would never match the advertisement.
        run: west build -b nrf52840dk/nrf52840 -d build/ble-host -s renode-ble-host -- -DCONFIG_RENODE_BLE_HOST_TARGET_NAME='"Renode"'
      - name: Renode ble-mode smoke test (default; full S4/S5)
        uses: ./.github/actions/zmk-renode-test
        with:
          elf-path: build/ble/zephyr/zmk.elf
          host-elf: build/ble-host/zephyr/zephyr.elf
      - name: Renode usb-mode smoke test (same real image as ble mode)
        # usb mode runs the EXACT artifact the ble smoke just ran -- no extra
        # firmware build -- and asserts a Studio GetDeviceInfo round trip over
        # the emulated USB CDC (NRF_USBD_Full + DualCdcAcmBridge).
        uses: ./.github/actions/zmk-renode-test
        with:
          mode: usb
          elf-path: build/ble/zephyr/zmk.elf
      - name: Renode uart-mode smoke test
        uses: ./.github/actions/zmk-renode-test
        with:
          mode: uart
          elf-path: build/renode/zephyr/zmk.elf

  renode-split:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    container:
      image: zmkfirmware/zmk-build-arm:stable
    name: Renode (wired split)
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Cache west modules
        uses: actions/cache@v4
        continue-on-error: true
        env:
          cache_name: cache-west-modules-renode-wired-split
        with:
          path: dependencies/
          key: ${{ runner.os }}-build-${{ env.cache_name }}-${{ hashFiles('scripts/west-test-renode.yml') }}
          restore-keys: |
            ${{ runner.os }}-build-${{ env.cache_name }}-
      - name: Init
        # Same main-pinned manifest as the renode job (HWv2 xiao_ble//zmk).
        run: |
          git config --global --add safe.directory ${{ github.workspace }}
          west init -l . --mf scripts/west-test-renode-standalone.yml
          west update --narrow
          west zephyr-export
      - name: Build wired-split central + peripheral halves
        # Both halves from the one renode_wired_split shield (console on uart0,
        # wired split on uart1, no BLE/USB); they differ only by
        # CONFIG_ZMK_SPLIT_ROLE_CENTRAL (set for the central in build-split.yaml).
        # -af split matches both split-central and split-peripheral artifacts.
        run: west zmk-build tests/zmk-config --build-yaml tests/zmk-config/build-split.yaml -af split -d build
      - name: Renode wired-split smoke test
        uses: ./.github/actions/zmk-renode-test
        with:
          mode: split
          elf-path: build/split-central/zephyr/zmk.elf
          peripheral-elf: build/split-peripheral/zephyr/zmk.elf

  renode-usb-split:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    container:
      image: zmkfirmware/zmk-build-arm:stable
    name: Renode (usb+wired split)
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Cache west modules
        uses: actions/cache@v4
        continue-on-error: true
        env:
          cache_name: cache-west-modules-renode-usb-wired-split
        with:
          path: dependencies/
          key: ${{ runner.os }}-build-${{ env.cache_name }}-${{ hashFiles('scripts/west-test-renode.yml') }}
          restore-keys: |
            ${{ runner.os }}-build-${{ env.cache_name }}-
      - name: Init
        # Same main-pinned manifest as the renode job (HWv2 xiao_ble//zmk).
        run: |
          git config --global --add safe.directory ${{ github.workspace }}
          west init -l . --mf scripts/west-test-renode-standalone.yml
          west update --narrow
          west zephyr-export
      - name: Build usb+wired split halves
        # The orthogonal combination the presets cannot express: a WIRED split
        # whose CENTRAL still answers Studio RPC (over emulated USB CDC). The
        # central (renode_usb_wired_split shield + studio-rpc-usb-uart snippet)
        # keeps USB on; the peripheral is the plain renode_wired_split half.
        run: west zmk-build tests/zmk-config --build-yaml tests/zmk-config/build-usb-split.yaml -af usb-wired -d build
      - name: Renode usb+wired-split smoke test
        # Asserts BOTH halves of what makes this combination valuable: a Studio
        # GetDeviceInfo round trip over the central's USB CDC AND a peripheral
        # keypress relayed over the wired link to the central ("position: 0").
        uses: ./.github/actions/zmk-renode-test
        with:
          host-link: usb
          split-link: wired
          elf-path: build/usb-wired-central/zephyr/zmk.elf
          peripheral-elf: build/usb-wired-peripheral/zephyr/zmk.elf

  renode-ble-split:
    runs-on: ubuntu-latest
    # HEAVY: three emulated nRF52840s on one BLE medium at a 10us quantum runs
    # ~0.1x realtime; a winning attempt completes by ~18s virtual (~3 min wall).
    # The split and host LE-SC pairings race on the shared radio, so the smoke
    # retries the whole emulation once (see renode_smoke.run_ble_split_smoke);
    # give a generous ceiling for two 120s-virtual attempts + the two extra
    # firmware builds on a slow shared runner.
    timeout-minutes: 90
    container:
      image: zmkfirmware/zmk-build-arm:stable
    name: Renode BLE-split
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Cache west modules
        uses: actions/cache@v4
        continue-on-error: true
        env:
          cache_name: cache-west-modules-renode-ble-split
        with:
          path: dependencies/
          key: ${{ runner.os }}-build-${{ env.cache_name }}-${{ hashFiles('scripts/west-test-renode.yml') }}
          restore-keys: |
            ${{ runner.os }}-build-${{ env.cache_name }}-
      - name: Init
        # Same main-pinned manifest as the renode job (HWv2 xiao_ble//zmk board).
        run: |
          git config --global --add safe.directory ${{ github.workspace }}
          west init -l . --mf scripts/west-test-renode-standalone.yml
          west update --narrow
          west zephyr-export
      - name: Build split CENTRAL half (renode_split_left; Studio + name "Renode")
        # The split central is the DUT the host reads: Studio + the exact
        # studio-rpc-usb-uart image, split-central role, advertises "Renode".
        run: west zmk-build tests/zmk-config --build-yaml tests/zmk-config/build-ble-split.yaml -af ble-split-central -d build
      - name: Build split PERIPHERAL half (renode_split_right; RTT-observed)
        run: west zmk-build tests/zmk-config --build-yaml tests/zmk-config/build-ble-split.yaml -af ble-split-peripheral -d build
      - name: Build renode-ble-host app
        run: west build -b nrf52840dk/nrf52840 -d build/ble-host -s renode-ble-host -- -DCONFIG_RENODE_BLE_HOST_TARGET_NAME='"Renode"'
      - name: Renode ble-split smoke test (peripheral -> central -> host)
        uses: ./.github/actions/zmk-renode-test
        with:
          mode: ble-split
          elf-path: build/ble-split-central/zephyr/zmk.elf
          peripheral-elf: build/ble-split-peripheral/zephyr/zmk.elf
          host-elf: build/ble-host/zephyr/zephyr.elf

  ble:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    container:
      image: zmkfirmware/zmk-build-arm:4.1
    name: BLE
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Cache west modules
        uses: actions/cache@v4
        continue-on-error: true
        env:
          cache_name: cache-west-modules-ble
        with:
          path: dependencies/
          key: ${{ runner.os }}-build-${{ env.cache_name }}-${{ hashFiles('scripts/west-test-ble.yml') }}
          restore-keys: |
            ${{ runner.os }}-build-${{ env.cache_name }}-
      - name: Init
        # The bsim BLE tests pin cormoran/zmk (two fixes not yet upstream --
        # see scripts/west-test-ble.yml), so this uses its own manifest,
        # separate from the build/renode jobs.
        run: |
          git config --global --add safe.directory ${{ github.workspace }}
          west init -l . --mf scripts/west-test-ble-standalone.yml
          west update --narrow
          west zephyr-export
      - name: Run BLE tests
        # Exercises the runner (and the composite action) end-to-end on this
        # repo's own tests/ble/split/basic case with -m pointing at this repo
        # (whose Zephyr module is inert for a pure-ZMK split case).
        uses: ./.github/actions/zmk-ble-test
        with:
          tests: tests/ble
          module: .
          extra-args: --sim-prefix ci_ble
      - name: Upload logs
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: ble-test-logs
          path: build/ble/**/*.log
          if-no-files-found: ignore
