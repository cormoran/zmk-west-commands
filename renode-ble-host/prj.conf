CONFIG_BT=y
CONFIG_BT_CENTRAL=y
CONFIG_BT_SMP=y
CONFIG_BT_GATT_CLIENT=y

# Just Works: no IO capabilities on the host, matching a keyboard host that has
# no display/keyboard for passkey entry.
CONFIG_BT_SMP_SC_PAIR_ONLY=y

CONFIG_BT_DEVICE_NAME="renode_ble_host"

# LOAD-BEARING: cap the LL data length so every encrypted on-air PDU
# (payload + the fake CCM's 4-byte MIC) stays within Renode's 31-byte radio
# packet cap. DLE's effective value is min(local, remote), so capping the host
# caps BOTH directions -- which is exactly why the ZMK DUT stays UNMODIFIED
# (it needs no matching cap). 27 (incl. MIC) fits <= 31. Without this the DUT
# negotiates larger PDUs and anything > 27+4 gets "trimmed" by Renode's radio,
# breaking the encrypted link. See README.md's Studio-over-BLE section.
CONFIG_BT_CTLR_DATA_LENGTH_MAX=27

# Logging so the S3 security-elevation failure signature and the S4 success
# path are visible on the console for diagnosis. Keep it light: BT_SMP /
# BT_HCI_CORE debug is fine, but LOG_MODE_IMMEDIATE (or heavier backends) can
# crash the soft link-layer under Renode's coarse-quantum timing.
CONFIG_LOG=y
CONFIG_BT_SMP_LOG_LEVEL_DBG=y
CONFIG_BT_HCI_CORE_LOG_LEVEL_DBG=y

# Keys in RAM only (single run); no settings/NVS backend, so the host avoids
# the erased-flash (0xFF) NVS boot dance entirely.
