# renode_tester is the single (non-split) DUT for `west zmk-renode-test --mode
# ble` and `--mode usb`. Both boot the real studio-rpc-usb-uart image whose
# console is on USB CDC -- silent under Renode in ble mode (USB not attached) and
# a Studio-only single-CDC composite in usb mode (no console CDC). So route ZMK's
# logs to SEGGER RTT (a real, hardware-flashable, Kconfig-only path) at DBG
# level, exactly like the renode_split peripheral half, so the standardized
# key-input check can observe the "position: %d" keymap log (keymap.c, DBG) after
# the harness injects a keypress. The harness captures this RTT stream
# (boot_single_real / boot_ble_pair rtt=True). Deferred logging (the default) --
# LOG_MODE_IMMEDIATE can crash the soft link-layer under Renode's coarse quantum.
CONFIG_LOG=y
CONFIG_USE_SEGGER_RTT=y
CONFIG_LOG_BACKEND_RTT=y
CONFIG_ZMK_LOG_LEVEL_DBG=y
