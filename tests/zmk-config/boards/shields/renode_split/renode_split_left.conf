# renode_split central half (left) -- the Studio-advertising DUT.
#
# LOAD-BEARING under Renode: cap the LL data length so every encrypted on-air
# PDU (payload + the fake CCM's 4-byte MIC) stays within Renode's 31-byte radio
# packet cap. The central holds TWO encrypted links -- to the split peripheral
# AND to the host -- and DLE's effective value is min(local, remote), so this
# one cap (matched by the peripheral's conf and the host app's prj.conf) keeps
# BOTH of the central's links inside the cap. Without it the split link
# negotiates larger PDUs and Renode's radio "trims" anything > 27+4, breaking
# the encrypted split link. See docs/renode-internals.md.
CONFIG_BT_CTLR_DATA_LENGTH_MAX=27

# Route ZMK's logs to SEGGER RTT at DBG level (same proven recipe as the
# peripheral half's renode_split_right.conf): the central's console is USB-CDC,
# silent under Renode, so the standardized key-input check reads the central's
# "position: %d" keymap log -- for a keypress injected on the peripheral and
# relayed over the split link -- off its RTT stream (boot_ble_split captures it).
# Additive to the Studio-serving image (RTT is a separate log backend, not USB).
# Deferred logging (the default); IMMEDIATE can crash the LL under coarse quantum.
CONFIG_LOG=y
CONFIG_USE_SEGGER_RTT=y
CONFIG_LOG_BACKEND_RTT=y
CONFIG_ZMK_LOG_LEVEL_DBG=y
