# renode_split peripheral half (right).
#
# Same LOAD-BEARING DLE cap as the central half (see renode_split_left.conf):
# the split peripheral<->central encrypted link must stay within Renode's
# 31-byte radio packet cap.
CONFIG_BT_CTLR_DATA_LENGTH_MAX=27

# Observation: the peripheral is a real (USB-CDC-console) image, so its console
# is silent under Renode. Route ZMK's logs to SEGGER RTT instead (a real,
# hardware-flashable, Kconfig-only path) at DBG level, so the split-peripheral
# "Security changed: ... level 2" line -- proof the encrypted split link is up
# -- is observable. The harness (boot_ble_split) captures this RTT stream and
# run_ble_split_smoke asserts on it. Kept to the peripheral (the minimal half),
# leaving the Studio-serving central image untouched. Deferred logging (the
# default) is used -- LOG_MODE_IMMEDIATE can crash the soft link-layer under
# Renode's coarse quantum.
CONFIG_LOG=y
CONFIG_USE_SEGGER_RTT=y
CONFIG_LOG_BACKEND_RTT=y
CONFIG_ZMK_LOG_LEVEL_DBG=y

# Poll the kscan-direct inputs instead of using interrupts, so the standardized
# key-input check can inject a keypress on THIS peripheral (the injected half in
# ble-split) and have it relayed to the central. The default interrupt path arms
# the nRF GPIO SENSE/DETECT -> GPIOTE PORT event, which Renode's GPIO model does
# not raise on a monitor `OnGPIO`; polling reads the pin IN register, which it
# does update. See renode_tester.conf for the full rationale.
CONFIG_ZMK_KSCAN_DIRECT_POLLING=y
