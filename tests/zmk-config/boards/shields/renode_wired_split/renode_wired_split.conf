# Shared config for BOTH wired-split halves (see renode_wired_split.overlay).
# The role differs only by CONFIG_ZMK_SPLIT_ROLE_CENTRAL, set for the central
# half via build-split.yaml's cmake-args -- everything else is common.
#
# Wired split only: enable ZMK split + force the wired UART transport to
# interrupt mode (async/DMA has an nRF52 RX bug; polling is untested here), and
# keep BLE/USB off. No BLE avoids the controller-command-timeout kernel oops an
# empty-NVS BLE image hits under Renode; no USB avoids the USBD busy-wait hang.
# CONFIG_LOG=y with ZMK's default DBG log level makes the central log the
# relayed key "position: %d" (keymap.c) the smoke asserts on.
CONFIG_ZMK_SPLIT=y
CONFIG_ZMK_SPLIT_WIRED_UART_MODE_INTERRUPT=y
CONFIG_ZMK_BLE=n
CONFIG_ZMK_USB=n
CONFIG_BOARD_SERIAL_BACKEND_CDC_ACM=n
CONFIG_LOG=y
CONFIG_LOG_PROCESS_THREAD_STARTUP_DELAY_MS=0
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_UART_INTERRUPT_DRIVEN=y
