# CENTRAL half of the usb+wired split for `west zmk-renode-test --host-link usb
# --split-link wired` (see docs/renode-transport-orthogonal.md). The peripheral
# half is the plain renode_wired_split shield (role peripheral) -- this file
# configures only the central.
#
# The whole point of this combination: a WIRED split whose central STILL answers
# Studio RPC. USB consumes no UARTE, so the central keeps its console on uart0
# AND drives the zmk,wired-split link on uart1 while Studio RPC rides the
# emulated USB CDC provided by the studio-rpc-usb-uart snippet (added by
# build-usb-split.yaml, which also sets CONFIG_ZMK_STUDIO=y). USB therefore
# stays ON here (unlike renode_wired_split, which disables it) -- the central
# boots on the real-image USB platform (xiao_nrf52840_usb.repl), exactly as usb
# mode does.
#
# Wired split link: force interrupt mode (async/DMA has an nRF52 RX bug under
# Renode; polling is untested here). No BLE -- this is a wired split, and no BLE
# also avoids the empty-NVS BLE controller oops under Renode.
CONFIG_ZMK_SPLIT=y
CONFIG_ZMK_SPLIT_WIRED_UART_MODE_INTERRUPT=y
CONFIG_ZMK_BLE=n

# Console stays on uart0 (a Renode TCP terminal): the boot banner and the
# relayed key "position: %d" log (keymap.c, at DBG) are read from it. Move the
# board's default console OFF the USB CDC (that board CDC is disabled in the
# overlay) so USB carries only the Studio CDC -- a single-CDC composite the
# DualCdcAcmBridge attaches to.
CONFIG_BOARD_SERIAL_BACKEND_CDC_ACM=n
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_UART_INTERRUPT_DRIVEN=y
CONFIG_LOG=y
CONFIG_LOG_PROCESS_THREAD_STARTUP_DELAY_MS=0
CONFIG_ZMK_LOG_LEVEL_DBG=y
