# Renode-testable firmware for `west zmk-renode-test` (see the repo README's
# `west zmk-renode-test` section). Kept in a separate file from build.yaml on
# purpose: it targets ZMK's HWv2 `xiao_ble//zmk` board (only in newer ZMK; see
# scripts/west-test-renode.yml), whereas build.yaml + the repo unittests target
# `seeeduino_xiao_ble` on the pinned v0.3-branch. Build it explicitly with:
#   west zmk-build tests/zmk-config --build-yaml tests/zmk-config/build-renode.yaml -af renode
#
# The `renode-studio-uart` snippet (provided by this repo as a Zephyr module)
# binds ZMK Studio RPC + the console to real UART peripherals in place of the
# USB-CDC path -- Renode's nRF52840 USBD model can't present a host-openable CDC
# port. Produces zephyr/zmk.elf. `CONFIG_ZMK_STUDIO=y` enables the core Studio
# RPC surface the smoke test exercises (GetDeviceInfo).
include:
  - artifact: renode
    board: xiao_ble//zmk
    # renode_tester is a Studio-ready shield (physical layout, no chosen
    # zmk,matrix-transform) -- required by CONFIG_ZMK_STUDIO's build assert.
    shield: renode_tester
    cmake-args: -DCONFIG_ZMK_STUDIO=y
    snippets:
      - renode-studio-uart
