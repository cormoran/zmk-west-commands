# Real-hardware DUT image for `west zmk-renode-test --mode ble` (the default
# mode; see the repo README's `west zmk-renode-test` section). Kept in its own
# file, alongside build-renode.yaml (the uart-mode snippet build) and separate
# from build.yaml + the repo unittests, because it targets ZMK's HWv2
# `xiao_ble//zmk` board (only in newer ZMK; see scripts/west-test-renode.yml).
# Build it explicitly with:
#   west zmk-build tests/zmk-config --build-yaml tests/zmk-config/build-ble.yaml -af ble
#
# Unlike build-renode.yaml, this uses NO renode-studio-uart snippet: it is the
# exact `studio-rpc-usb-uart` image you would flash to hardware (USB CDC + QSPI
# NOR + BLE). That is the whole point of ble mode -- platform stubs make the
# real image boot under Renode, so a module needs no extra Renode-specific build
# config. `CONFIG_ZMK_STUDIO=y` enables the Studio RPC surface; on xiao_ble
# `CONFIG_ZMK_BLE` defaults on, so the DUT advertises and the host can pair.
# Produces zephyr/zmk.elf; the renode_tester shield names the DUT "Renode".
include:
  - artifact: ble
    board: xiao_ble//zmk
    # renode_tester is a Studio-ready shield (physical layout, no chosen
    # zmk,matrix-transform) -- required by CONFIG_ZMK_STUDIO's build assert.
    shield: renode_tester
    cmake-args: -DCONFIG_ZMK_STUDIO=y
    snippets:
      - studio-rpc-usb-uart
